<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>COMPASS AI Sandbox</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="brand">
        <div class="brand-mark">C</div>
        <div>
          <div class="brand-title">COMPASS AI</div>
          <div class="brand-subtitle">Sandbox</div>
        </div>
      </div>

      <nav class="nav-list">
        <a href="#dashboard" data-route="dashboard" class="nav-link active">Dashboard</a>
        <a href="#generator" data-route="generator" class="nav-link">Data Generator</a>
        <a href="#viewer" data-route="viewer" class="nav-link">Data Viewer</a>
        <a href="#training" data-route="training" class="nav-link">Training</a>
        <a href="#models" data-route="models" class="nav-link">Models</a>
        <a href="#assignment-lab" data-route="assignment-lab" class="nav-link">Assignment Lab</a>
        <a href="#reports" data-route="reports" class="nav-link">Reports</a>
        <a href="#settings" data-route="settings" class="nav-link">Settings</a>
      </nav>

      <div class="sidebar-footer">
        <div class="backend-indicator">
          <span class="status-dot" id="backend-dot"></span>
          <span id="backend-status">Checking backend</span>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local browser app</p>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <button class="secondary-button" id="refresh-button" type="button">Refresh</button>
      </header>

      <section id="app" class="content-panel" aria-live="polite">
        <div class="loading-state">Loading sandbox UI...</div>
      </section>
    </main>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
