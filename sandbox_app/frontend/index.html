<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      name="description"
      content="COMPASS AI Sandbox — локальная автономная песочница для генерации данных, просмотра datasets и экспериментов с моделями."
    />
    <title>COMPASS AI Sandbox</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Навигация COMPASS AI Sandbox">
        <a class="brand" href="/" data-link>
          <span class="brand-mark">C</span>
          <span>
            <strong>COMPASS AI</strong>
            <small>Sandbox</small>
          </span>
        </a>

        <nav class="nav-list">
          <a href="/" data-link data-route="/">Dashboard</a>
          <a href="/generator" data-link data-route="/generator">Data Generator</a>
          <a href="/viewer" data-link data-route="/viewer">Data Viewer</a>
          <a href="/import-data" data-link data-route="/import-data">Import Data</a>
          <a href="/training" data-link data-route="/training">Training</a>
          <a href="/models" data-link data-route="/models">Models</a>
          <a href="/assignment-lab" data-link data-route="/assignment-lab">Assignment Lab</a>
          <a href="/reports" data-link data-route="/reports">Reports</a>
          <a href="/settings" data-link data-route="/settings">Settings</a>
        </nav>

        <section class="sidebar-card">
          <p class="muted">Backend</p>
          <div class="status-pill status-pending" id="backendStatus">
            <span class="status-dot"></span>
            <span>Проверка...</span>
          </div>
        </section>
      </aside>

      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="routeEyebrow">Local app</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <div class="topbar-actions">
            <button class="button button-secondary" id="refreshButton" type="button">
              Обновить
            </button>
            <a class="button button-primary" href="/api/docs" target="_blank" rel="noreferrer">
              API Docs
            </a>
          </div>
        </header>

        <section class="page" id="appRoot" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
